<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoPE Transformer Explorer</title>
<style>
:root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a2e;
    --surface: #1e1e32;
    --border: #2a2a44;
    --text: #e0e0f0;
    --text2: #a0a0c0;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00e676;
    --red: #ff5252;
    --orange: #ffab40;
    --blue: #448aff;
    --cyan: #18ffff;
    --pink: #ff4081;
    --yellow: #ffd740;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
}
.header {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border-bottom: 1px solid var(--border);
    padding: 20px 30px;
}
.header h1 {
    font-size: 24px;
    background: linear-gradient(90deg, var(--accent2), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
}
.header .subtitle {
    color: var(--text2);
    font-size: 13px;
}
.model-info {
    display: flex;
    gap: 20px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--text2);
}
.model-info span {
    background: var(--surface);
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
}
.model-info .val { color: var(--cyan); }
.input-section {
    padding: 20px 30px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
}
.input-row {
    display: flex;
    gap: 12px;
    align-items: center;
}
.input-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
}
.input-row input:focus { border-color: var(--accent); }
.input-row button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
}
.input-row button:hover { background: var(--accent2); }
.presets {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.presets button {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
}
.presets button:hover { border-color: var(--accent); color: var(--text); }
.main { padding: 20px 30px; }
.section {
    margin-bottom: 24px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
}
.section-header {
    padding: 12px 16px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
}
.section-header h2 {
    font-size: 14px;
    color: var(--accent2);
}
.section-header .toggle {
    color: var(--text2);
    font-size: 12px;
}
.section-body { padding: 16px; }
.section-body.collapsed { display: none; }
.math-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 12px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text2);
}
.math-box .eq {
    color: var(--cyan);
    font-weight: bold;
}
.math-box .label { color: var(--orange); }
.token-bar {
    display: flex;
    gap: 2px;
    margin: 12px 0;
    flex-wrap: wrap;
}
.token-cell {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
}
.token-cell:hover, .token-cell.selected {
    border-color: var(--accent);
    background: var(--bg3);
}
.token-cell .pos {
    position: absolute;
    bottom: -14px;
    font-size: 9px;
    color: var(--text2);
}
.heatmap-container {
    overflow-x: auto;
    margin: 8px 0;
}
.heatmap {
    display: inline-block;
}
.heatmap-row {
    display: flex;
    align-items: center;
}
.heatmap-label {
    width: 28px;
    text-align: center;
    font-size: 10px;
    color: var(--text2);
    flex-shrink: 0;
}
.heatmap-cell {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    position: relative;
}
.heatmap-cell:hover {
    outline: 2px solid var(--accent);
    z-index: 1;
}
.heatmap-cell .tooltip {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    border: 1px solid var(--accent);
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
    font-size: 11px;
    z-index: 10;
    pointer-events: none;
}
.heatmap-cell:hover .tooltip { display: block; }
.head-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
}
.head-tab {
    padding: 6px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
}
.head-tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
}
.layer-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
}
.layer-tab {
    padding: 6px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
}
.layer-tab.active {
    background: var(--bg3);
    color: var(--cyan);
    border-color: var(--cyan);
}
.predictions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
}
.pred-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
}
.pred-card .pos-label {
    font-size: 10px;
    color: var(--text2);
    margin-bottom: 4px;
}
.pred-card .input-char {
    font-size: 18px;
    color: var(--cyan);
    margin-bottom: 6px;
}
.pred-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 3px 0;
    font-size: 11px;
}
.pred-bar .char {
    width: 20px;
    text-align: center;
    color: var(--accent2);
}
.pred-bar .bar {
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
    min-width: 2px;
}
.pred-bar .prob {
    color: var(--text2);
    font-size: 10px;
    min-width: 40px;
}
.pred-bar.correct .char { color: var(--green); }
.pred-bar.correct .bar { background: var(--green); }
.rope-viz {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
}
.rope-circle {
    width: 140px;
    text-align: center;
}
.rope-circle canvas {
    border: 1px solid var(--border);
    border-radius: 50%;
    background: var(--surface);
}
.rope-circle .label {
    font-size: 10px;
    color: var(--text2);
    margin-top: 4px;
}
.matrix-view {
    overflow-x: auto;
    margin: 8px 0;
}
.matrix-view table {
    border-collapse: collapse;
    font-size: 10px;
}
.matrix-view td, .matrix-view th {
    padding: 2px 6px;
    border: 1px solid var(--border);
    text-align: right;
    white-space: nowrap;
}
.matrix-view th {
    background: var(--bg3);
    color: var(--text2);
}
.sub-section {
    margin: 12px 0;
    padding: 12px;
    background: var(--surface);
    border-radius: 6px;
    border: 1px solid var(--border);
}
.sub-section h3 {
    font-size: 12px;
    color: var(--orange);
    margin-bottom: 8px;
}
.inline-flex {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
}
.dim-selector {
    margin: 8px 0;
    font-size: 11px;
    color: var(--text2);
}
.dim-selector select {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
}
#loading {
    display: none;
    text-align: center;
    padding: 40px;
    color: var(--text2);
}
#loading.active { display: block; }
#results { display: none; }
#results.active { display: block; }
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
}
.empty-state p { margin: 8px 0; font-size: 13px; }
canvas { image-rendering: pixelated; }
.freq-table {
    font-size: 11px;
    margin: 8px 0;
}
.freq-table td {
    padding: 3px 8px;
    border-bottom: 1px solid var(--border);
}
.freq-table .dim { color: var(--cyan); }
.freq-table .val { color: var(--orange); }
</style>
</head>
<body>

<div class="header">
    <h1>RoPE Transformer Explorer</h1>
    <div class="subtitle">Interactive visualization of Rotary Position Embeddings &amp; Induction Heads</div>
    <div class="model-info" id="model-info"></div>
</div>

<div class="input-section">
    <div class="input-row">
        <input type="text" id="input-text" placeholder="Type text to analyze (a-z + space)..." maxlength="64" value="abc abc">
        <button onclick="runInference()">Analyze</button>
    </div>
    <div class="presets">
        <span style="color: var(--text2); font-size: 11px; padding: 4px 0;">Try:</span>
        <button onclick="setInput('abc abc')">abc abc</button>
        <button onclick="setInput('hello hello')">hello hello</button>
        <button onclick="setInput('xyz xyz')">xyz xyz</button>
        <button onclick="setInput('the cat the cat')">the cat the cat</button>
        <button onclick="setInput('ab cd ab cd')">ab cd ab cd</button>
        <button onclick="setInput('aabaa')">aabaa</button>
        <button onclick="setInput('abcdefg abcdefg')">abcdefg abcdefg</button>
    </div>
</div>

<div class="main">
    <div class="empty-state" id="empty-state">
        <p style="font-size: 20px; color: var(--accent2);">Enter text above to explore the transformer</p>
        <p>See token embeddings, RoPE rotations, attention patterns, and predictions step-by-step</p>
    </div>
    <div id="loading"><p>Running inference...</p></div>
    <div id="results"></div>
</div>

<script>
let modelInfo = null;
let currentData = null;
let selectedLayer = 0;
let selectedHead = 0;

async function init() {
    const resp = await fetch('/api/model-info');
    modelInfo = await resp.json();
    const mi = document.getElementById('model-info');
    mi.innerHTML = `
        <span>Vocab: <span class="val">${modelInfo.vocab_size}</span> tokens</span>
        <span>Layers: <span class="val">${modelInfo.n_layers}</span></span>
        <span>Heads: <span class="val">${modelInfo.n_heads}</span></span>
        <span>d_model: <span class="val">${modelInfo.d_model}</span></span>
        <span>d_head: <span class="val">${modelInfo.d_head}</span></span>
        <span>Params: <span class="val">${(modelInfo.total_params/1000).toFixed(1)}K</span></span>
        <span>RoPE base: <span class="val">${modelInfo.rope_base}</span></span>
    `;
    // Auto-run with default input
    runInference();
}

function setInput(text) {
    document.getElementById('input-text').value = text;
    runInference();
}

async function runInference() {
    const text = document.getElementById('input-text').value.toLowerCase();
    if (!text) return;

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('loading').classList.add('active');
    document.getElementById('results').classList.remove('active');

    try {
        const resp = await fetch('/api/inference', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text})
        });
        currentData = await resp.json();
        renderResults();
    } catch(e) {
        console.error(e);
        alert('Inference failed: ' + e.message);
    }

    document.getElementById('loading').classList.remove('active');
    document.getElementById('results').classList.add('active');
}

function renderResults() {
    const d = currentData;
    const container = document.getElementById('results');

    let html = '';

    // 1. Token Embeddings
    html += renderSection('tokens', 'Step 1: Token Embeddings', `
        <div class="math-box">
            <span class="label">Input:</span> "${d.input.text}"<br>
            <span class="label">Token IDs:</span> [${d.input.tokens.join(', ')}]<br>
            <span class="eq">x = Embedding(token_id) → ℝ^${modelInfo.d_model}</span><br>
            <span class="label">Note:</span> No positional embedding added — RoPE encodes position in Q,K during attention!
        </div>
        <div class="token-bar">
            ${d.input.token_names.map((c, i) =>
                `<div class="token-cell" title="pos=${i}, id=${d.input.tokens[i]}">
                    ${c === ' ' ? '⎵' : c}
                    <span class="pos">${i}</span>
                </div>`
            ).join('')}
        </div>
        ${renderEmbeddingHeatmap(d.token_embeddings, d.input.token_names, 'Token Embedding Vectors (first 32 dims)')}
    `);

    // 2. RoPE Frequencies
    html += renderSection('rope', 'Step 2: RoPE — Rotary Position Embeddings', `
        <div class="math-box">
            <span class="label">RoPE Rotation Frequencies:</span><br>
            <span class="eq">θ_i = 1 / (${modelInfo.rope_base}^(2i / ${d.rope_info.d_head}))</span> for i = 0, 1, ..., ${d.rope_info.n_pairs - 1}<br><br>
            <span class="label">For query/key x at position m:</span><br>
            <span class="eq">RoPE(x, m)[2i]   = x[2i]·cos(m·θ_i) − x[2i+1]·sin(m·θ_i)</span><br>
            <span class="eq">RoPE(x, m)[2i+1] = x[2i]·sin(m·θ_i) + x[2i+1]·cos(m·θ_i)</span><br><br>
            <span class="label">Key property:</span> <span class="eq">dot(RoPE(q,m), RoPE(k,n))</span> depends only on <span class="eq">(m−n)</span>, making attention position-relative.
        </div>
        ${renderRoPEFrequencies(d.rope_info)}
        ${renderRoPECircles(d.rope_info, d.input.token_names)}
        ${renderRoPEHeatmap(d.rope_info, d.input.token_names)}
    `);

    // 3. Layer-by-layer attention
    for (let L = 0; L < d.layers.length; L++) {
        html += renderSection(`layer${L}`, `Step ${3+L}: Layer ${L} — Attention + FFN`, `
            ${renderLayerDetails(d, L)}
        `);
    }

    // 4. Final Predictions
    html += renderSection('predictions', `Step ${3 + d.layers.length}: Final Predictions`, `
        <div class="math-box">
            <span class="label">Output:</span> <span class="eq">logits = W_out · LayerNorm(hidden)</span><br>
            <span class="label">Probabilities:</span> <span class="eq">P(next_token) = softmax(logits)</span>
        </div>
        ${renderPredictions(d)}
    `);

    container.innerHTML = html;

    // Set up section toggles
    container.querySelectorAll('.section-header').forEach(header => {
        header.addEventListener('click', () => {
            const body = header.nextElementSibling;
            body.classList.toggle('collapsed');
            header.querySelector('.toggle').textContent = body.classList.contains('collapsed') ? '▶' : '▼';
        });
    });
}

function renderSection(id, title, content) {
    return `
        <div class="section" id="section-${id}">
            <div class="section-header">
                <h2>${title}</h2>
                <span class="toggle">▼</span>
            </div>
            <div class="section-body">${content}</div>
        </div>
    `;
}

function renderEmbeddingHeatmap(embeddings, labels, title) {
    const nDims = Math.min(32, embeddings[0].length);
    let html = `<div class="sub-section"><h3>${title}</h3>`;
    html += '<div class="heatmap-container"><div class="heatmap">';

    // Header row
    html += '<div class="heatmap-row"><div class="heatmap-label"></div>';
    for (let d = 0; d < nDims; d++) {
        html += `<div class="heatmap-label" style="font-size:8px">${d}</div>`;
    }
    html += '</div>';

    // Find min/max for color scaling
    let allVals = [];
    embeddings.forEach(row => row.slice(0, nDims).forEach(v => allVals.push(v)));
    const maxAbs = Math.max(...allVals.map(Math.abs), 0.001);

    for (let i = 0; i < embeddings.length; i++) {
        html += '<div class="heatmap-row">';
        const lbl = labels[i] === ' ' ? '⎵' : labels[i];
        html += `<div class="heatmap-label">${lbl}</div>`;
        for (let d = 0; d < nDims; d++) {
            const v = embeddings[i][d];
            const color = valueToColor(v, maxAbs);
            html += `<div class="heatmap-cell" style="background:${color}">
                <span class="tooltip">[${i}][${d}] = ${v.toFixed(4)}</span>
            </div>`;
        }
        html += '</div>';
    }
    html += '</div></div></div>';
    return html;
}

function renderRoPEFrequencies(ropeInfo) {
    let html = '<div class="sub-section"><h3>Rotation Frequencies (θ_i)</h3>';
    html += '<table class="freq-table"><tr><td class="dim">Dim pair (i)</td>';

    const nShow = Math.min(8, ropeInfo.thetas.length);
    for (let i = 0; i < nShow; i++) {
        html += `<td class="dim">${i}</td>`;
    }
    if (nShow < ropeInfo.thetas.length) html += '<td>...</td>';
    html += '</tr><tr><td>θ_i</td>';
    for (let i = 0; i < nShow; i++) {
        html += `<td class="val">${ropeInfo.thetas[i].toFixed(6)}</td>`;
    }
    if (nShow < ropeInfo.thetas.length) html += '<td>...</td>';
    html += '</tr><tr><td>Period (2π/θ_i)</td>';
    for (let i = 0; i < nShow; i++) {
        html += `<td class="val">${(2 * Math.PI / ropeInfo.thetas[i]).toFixed(1)}</td>`;
    }
    if (nShow < ropeInfo.thetas.length) html += '<td>...</td>';
    html += '</tr></table>';

    html += `<div style="font-size:11px; color:var(--text2); margin-top:8px;">
        Low i → high frequency (fast rotation, local patterns) | High i → low frequency (slow rotation, global patterns)
    </div>`;
    html += '</div>';
    return html;
}

function renderRoPECircles(ropeInfo, tokenLabels) {
    const seqLen = tokenLabels.length;
    const nCircles = Math.min(4, ropeInfo.n_pairs);

    let html = '<div class="sub-section"><h3>RoPE Rotation Visualization (each circle = one dimension pair)</h3>';
    html += `<div style="font-size:11px; color:var(--text2); margin-bottom:8px;">
        Each dot shows how position m rotates in the (2i, 2i+1) plane. Angle = m·θ_i
    </div>`;
    html += '<div class="rope-viz">';

    for (let i = 0; i < nCircles; i++) {
        const canvasId = `rope-circle-${i}`;
        html += `<div class="rope-circle">
            <canvas id="${canvasId}" width="140" height="140"></canvas>
            <div class="label">Pair i=${i}, θ=${ropeInfo.thetas[i].toFixed(4)}</div>
        </div>`;
    }
    html += '</div></div>';

    // We'll draw circles after DOM update
    setTimeout(() => {
        for (let i = 0; i < nCircles; i++) {
            drawRoPECircle(`rope-circle-${i}`, ropeInfo, i, seqLen, tokenLabels);
        }
    }, 50);

    return html;
}

function drawRoPECircle(canvasId, ropeInfo, dimPair, seqLen, labels) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    const cx = w/2, cy = h/2, r = 55;

    ctx.clearRect(0, 0, w, h);

    // Draw circle
    ctx.strokeStyle = '#2a2a44';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.stroke();

    // Draw axes
    ctx.strokeStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.moveTo(cx-r, cy); ctx.lineTo(cx+r, cy);
    ctx.moveTo(cx, cy-r); ctx.lineTo(cx, cy+r);
    ctx.stroke();

    // Draw position dots
    const maxPos = Math.min(seqLen, 20);
    const colors = ['#6c5ce7', '#00e676', '#ff5252', '#ffab40', '#448aff', '#18ffff', '#ff4081', '#ffd740'];

    for (let m = 0; m < maxPos; m++) {
        const angle = ropeInfo.frequencies[m][dimPair];
        const x = cx + r * Math.cos(angle);
        const y = cy - r * Math.sin(angle);

        const color = colors[m % colors.length];
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI*2);
        ctx.fill();

        // Label
        ctx.fillStyle = '#e0e0f0';
        ctx.font = '9px monospace';
        const lbl = labels[m] === ' ' ? '⎵' : labels[m];
        ctx.fillText(`${m}:${lbl}`, x + 5, y - 3);
    }
}

function renderRoPEHeatmap(ropeInfo, tokenLabels) {
    const seqLen = tokenLabels.length;
    const nDims = Math.min(16, ropeInfo.n_pairs);

    let html = '<div class="sub-section"><h3>cos(m·θ_i) values — applied to Q and K</h3>';
    html += '<div class="heatmap-container"><div class="heatmap">';

    // Header
    html += '<div class="heatmap-row"><div class="heatmap-label">pos</div>';
    for (let d = 0; d < nDims; d++) {
        html += `<div class="heatmap-label" style="font-size:8px">i=${d}</div>`;
    }
    html += '</div>';

    for (let m = 0; m < seqLen; m++) {
        html += '<div class="heatmap-row">';
        const lbl = tokenLabels[m] === ' ' ? '⎵' : tokenLabels[m];
        html += `<div class="heatmap-label">${m}:${lbl}</div>`;
        for (let d = 0; d < nDims; d++) {
            const v = ropeInfo.cos_values[m][d];
            const color = valueToColor(v, 1.0);
            html += `<div class="heatmap-cell" style="background:${color}">
                <span class="tooltip">cos(${m}·θ_${d}) = ${v.toFixed(4)}</span>
            </div>`;
        }
        html += '</div>';
    }
    html += '</div></div></div>';
    return html;
}

function renderLayerDetails(data, layerIdx) {
    const layer = data.layers[layerIdx];
    const nHeads = layer.heads.length;

    let html = '<div class="math-box">';
    html += `<span class="label">Layer ${layerIdx} computation:</span><br>`;
    html += '<span class="eq">Q = W_Q · x,  K = W_K · x,  V = W_V · x</span><br>';
    html += '<span class="eq">Q_rot = RoPE(Q, pos),  K_rot = RoPE(K, pos)</span><br>';
    html += '<span class="eq">Attn = softmax(Q_rot · K_rot^T / √d_k) · V</span><br>';
    html += '<span class="eq">Output = x + W_O · Attn + FFN(LayerNorm(x + W_O · Attn))</span>';
    html += '</div>';

    // Head tabs
    html += '<div class="head-tabs">';
    for (let h = 0; h < nHeads; h++) {
        html += `<button class="head-tab ${h === 0 ? 'active' : ''}"
                  onclick="switchHead(this, ${layerIdx}, ${h})">Head ${h}</button>`;
    }
    html += '</div>';

    // Head content containers
    for (let h = 0; h < nHeads; h++) {
        html += `<div id="layer${layerIdx}-head${h}" style="display:${h === 0 ? 'block' : 'none'}">`;
        html += renderHeadDetails(data, layerIdx, h);
        html += '</div>';
    }

    return html;
}

function switchHead(btn, layerIdx, headIdx) {
    // Update tab styling
    btn.parentElement.querySelectorAll('.head-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    // Show/hide content
    const nHeads = currentData.layers[layerIdx].heads.length;
    for (let h = 0; h < nHeads; h++) {
        document.getElementById(`layer${layerIdx}-head${h}`).style.display = h === headIdx ? 'block' : 'none';
    }
}

function renderHeadDetails(data, layerIdx, headIdx) {
    const head = data.layers[layerIdx].heads[headIdx];
    const labels = data.input.token_names;
    const seqLen = labels.length;

    let html = '';

    // Q, K before and after RoPE (first few dims)
    const nDims = Math.min(16, head.Q_pre_rope[0].length);

    html += '<div class="inline-flex">';
    html += renderSmallMatrix(head.Q_pre_rope, labels, 'Q (pre-RoPE)', nDims);
    html += renderSmallMatrix(head.Q_rotated, labels, 'Q (after RoPE)', nDims);
    html += '</div>';

    html += '<div class="inline-flex">';
    html += renderSmallMatrix(head.K_pre_rope, labels, 'K (pre-RoPE)', nDims);
    html += renderSmallMatrix(head.K_rotated, labels, 'K (after RoPE)', nDims);
    html += '</div>';

    // Attention heatmap - THIS IS THE KEY VISUALIZATION
    html += renderAttentionHeatmap(head.attn_weights, labels,
        `Attention Weights — Layer ${layerIdx}, Head ${headIdx}`);

    // V matrix
    html += renderSmallMatrix(head.V, labels, 'V (Value vectors)', nDims);

    return html;
}

function renderSmallMatrix(matrix, labels, title, nDims) {
    let html = `<div class="sub-section" style="flex:1; min-width: 300px;"><h3>${title}</h3>`;
    html += '<div class="heatmap-container"><div class="heatmap">';

    // Header
    html += '<div class="heatmap-row"><div class="heatmap-label"></div>';
    for (let d = 0; d < nDims; d++) {
        html += `<div class="heatmap-label" style="font-size:8px">${d}</div>`;
    }
    html += '</div>';

    let allVals = [];
    matrix.forEach(row => {
        for (let d = 0; d < nDims; d++) allVals.push(row[d]);
    });
    const maxAbs = Math.max(...allVals.map(Math.abs), 0.001);

    for (let i = 0; i < matrix.length; i++) {
        html += '<div class="heatmap-row">';
        const lbl = labels[i] === ' ' ? '⎵' : labels[i];
        html += `<div class="heatmap-label">${lbl}</div>`;
        for (let d = 0; d < nDims; d++) {
            const v = matrix[i][d];
            const color = valueToColor(v, maxAbs);
            html += `<div class="heatmap-cell" style="background:${color}">
                <span class="tooltip">${title}[${i}][${d}] = ${v.toFixed(4)}</span>
            </div>`;
        }
        html += '</div>';
    }
    html += '</div></div></div>';
    return html;
}

function renderAttentionHeatmap(weights, labels, title) {
    const seqLen = weights.length;

    let html = `<div class="sub-section"><h3>${title}</h3>`;
    html += `<div style="font-size:11px; color:var(--text2); margin-bottom:8px;">
        Row = query position (predicting next token), Column = key position (attending to).
        Bright = high attention. Causal mask zeroes out future positions.
    </div>`;
    html += '<div class="heatmap-container"><div class="heatmap">';

    // Header
    html += '<div class="heatmap-row"><div class="heatmap-label" style="width:40px">Q\\K</div>';
    for (let k = 0; k < seqLen; k++) {
        const lbl = labels[k] === ' ' ? '⎵' : labels[k];
        html += `<div class="heatmap-label">${lbl}</div>`;
    }
    html += '</div>';

    for (let q = 0; q < seqLen; q++) {
        html += '<div class="heatmap-row">';
        const qlbl = labels[q] === ' ' ? '⎵' : labels[q];
        html += `<div class="heatmap-label" style="width:40px">${q}:${qlbl}</div>`;
        for (let k = 0; k < seqLen; k++) {
            const v = weights[q][k];
            const intensity = Math.pow(v, 0.5); // sqrt for better visibility
            const r = Math.round(108 + 147 * intensity);
            const g = Math.round(92 + 163 * intensity);
            const b = Math.round(231);
            const alpha = 0.1 + 0.9 * intensity;
            const color = `rgba(${r},${g},${b},${alpha})`;
            const klbl = labels[k] === ' ' ? '⎵' : labels[k];
            html += `<div class="heatmap-cell" style="background:${color}">
                <span class="tooltip">Q:${q}(${qlbl}) → K:${k}(${klbl}) = ${v.toFixed(4)}</span>
            </div>`;
        }
        html += '</div>';
    }
    html += '</div></div>';

    // Attention pattern description
    html += `<div style="font-size:11px; color:var(--text2); margin-top:8px;">
        <strong style="color:var(--orange)">Induction head pattern:</strong>
        Look for off-diagonal stripes where the model attends to positions where the same token appeared before (copying pattern).
    </div>`;
    html += '</div>';
    return html;
}

function renderPredictions(data) {
    const preds = data.predictions;
    const text = data.input.text;

    let html = '<div class="predictions-grid">';
    for (let i = 0; i < preds.length; i++) {
        const p = preds[i];
        const nextChar = i < text.length - 1 ? text[i+1] : null;
        const inputDisp = p.input_char === ' ' ? '⎵' : p.input_char;

        html += `<div class="pred-card">`;
        html += `<div class="pos-label">Position ${i}</div>`;
        html += `<div class="input-char">After "${inputDisp}" predict:</div>`;

        for (const pred of p.top_predictions) {
            const predDisp = pred.token === ' ' ? '⎵' : pred.token;
            const isCorrect = nextChar !== null && pred.token === nextChar;
            const barWidth = Math.max(2, pred.probability * 150);
            html += `<div class="pred-bar ${isCorrect ? 'correct' : ''}">
                <span class="char">${predDisp}</span>
                <span class="bar" style="width:${barWidth}px"></span>
                <span class="prob">${(pred.probability * 100).toFixed(1)}%</span>
                ${isCorrect ? '<span style="color:var(--green)">✓</span>' : ''}
            </div>`;
        }
        html += '</div>';
    }
    html += '</div>';
    return html;
}

function valueToColor(v, maxAbs) {
    const norm = v / maxAbs; // -1 to 1
    if (norm >= 0) {
        const intensity = Math.min(norm, 1);
        return `rgba(0, 230, 118, ${intensity * 0.8})`;
    } else {
        const intensity = Math.min(-norm, 1);
        return `rgba(255, 82, 82, ${intensity * 0.8})`;
    }
}

// Handle enter key
document.getElementById('input-text').addEventListener('keydown', e => {
    if (e.key === 'Enter') runInference();
});

init();
</script>
